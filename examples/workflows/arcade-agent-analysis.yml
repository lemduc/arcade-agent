name: Arcade Architecture Analysis

on:
  pull_request:
  push:
  workflow_dispatch:

# Copy this file to .github/workflows/arcade-agent-analysis.yml in any repository
# that should run arcade-agent architecture analysis.
env:
  ARCADE_AGENT_VERSION: "0.1.1"
  PYTHON_VERSION: "3.12"
  INSTALL_EXTRAS: "[languages]"
  SOURCE_PATH: "."
  LANGUAGE: ""
  REPO_NAME: ""
  PRIMARY_ALGORITHM: pkg
  RUN_SECONDARY_ANALYSES: "true"
  WCA_NUM_CLUSTERS: "4"
  FILTER_NON_ARCHITECTURAL_HELPERS: "false"
  UPLOAD_ARTIFACTS: "true"
  ANALYSIS_ARTIFACT_NAME: arcade-agent-self-analysis
  ANALYSIS_ARTIFACT_RETENTION_DAYS: "30"
  BASELINE_BRANCH: ${{ github.event.repository.default_branch }}
  BASELINE_ARTIFACT_NAME: arcade-agent-baseline
  BASELINE_RETENTION_DAYS: "90"
  STORE_BASELINE_ON_PUSH: "true"
  POST_PR_COMMENT: "true"

jobs:
  architecture-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target-repo
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install arcade-agent
        run: |
          python -m pip install --upgrade pip
          if [ "${ARCADE_AGENT_VERSION}" = "latest" ]; then
            python -m pip install "arcade-agent${INSTALL_EXTRAS}"
          else
            python -m pip install "arcade-agent${INSTALL_EXTRAS}==${ARCADE_AGENT_VERSION}"
          fi

      - name: Run primary architecture analysis
        run: |
          ARGS=(--source "target-repo/${SOURCE_PATH}")
          if [ -n "${LANGUAGE}" ]; then
            ARGS+=(--language "${LANGUAGE}")
          fi
          if [ -n "${REPO_NAME}" ]; then
            ARGS+=(--repo-name "${REPO_NAME}")
          fi
          if [ "${FILTER_NON_ARCHITECTURAL_HELPERS}" = "true" ]; then
            ARGS+=(--filter-non-architectural-helpers)
          fi
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm "${PRIMARY_ALGORITHM}" \
            --output-json arcade_analysis_results.json \
            --output-html arcade_analysis_report.html

      - name: Run secondary architecture analyses
        if: env.RUN_SECONDARY_ANALYSES == 'true'
        run: |
          ARGS=(--source "target-repo/${SOURCE_PATH}")
          if [ -n "${LANGUAGE}" ]; then
            ARGS+=(--language "${LANGUAGE}")
          fi
          if [ -n "${REPO_NAME}" ]; then
            ARGS+=(--repo-name "${REPO_NAME}")
          fi
          if [ "${FILTER_NON_ARCHITECTURAL_HELPERS}" = "true" ]; then
            ARGS+=(--filter-non-architectural-helpers)
          fi
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm acdc \
            --output-json arcade_analysis_acdc.json \
            --output-html arcade_analysis_acdc.html
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm wca \
            --num-clusters "${WCA_NUM_CLUSTERS}" \
            --output-json arcade_analysis_wca.json \
            --output-html arcade_analysis_wca.html

      - name: Display analysis results
        run: |
          arcade-log-analysis-summary arcade_analysis_results.json
          if [ "${RUN_SECONDARY_ANALYSES}" = "true" ]; then
            echo "== ACDC =="
            arcade-log-analysis-summary arcade_analysis_acdc.json
            echo "== WCA (exploratory) =="
            arcade-log-analysis-summary arcade_analysis_wca.json
          fi

      - name: Download baseline artifact
        id: download_baseline
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: process.env.BASELINE_BRANCH,
              status: 'success',
              per_page: 20,
            });

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });

              const baseline = artifacts.data.artifacts.find(
                artifact => artifact.name === process.env.BASELINE_ARTIFACT_NAME
              );
              if (!baseline) continue;

              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: baseline.id,
                archive_format: 'zip',
              });

              fs.writeFileSync('baseline.zip', Buffer.from(download.data));
              core.setOutput('found', 'true');
              console.log(`Downloaded baseline from run ${run.id} (${run.created_at})`);
              return;
            }

            core.setOutput('found', 'false');
            console.log('No baseline artifact found.');

      - name: Unpack baseline
        if: steps.download_baseline.outputs.found == 'true'
        run: |
          mkdir -p baseline_dir
          unzip -q baseline.zip -d baseline_dir
          ls baseline_dir/

      - name: Compare with baseline
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BASELINE_ARG=""
          BASELINE_NOTE=""
          CURRENT_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('arcade_analysis_results.json').read_text()).get('algorithm', ''))")
          if [ -f baseline_dir/arcade_analysis_baseline.json ]; then
            BASELINE_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('baseline_dir/arcade_analysis_baseline.json').read_text()).get('algorithm', ''))")
            if [ "$BASELINE_ALGORITHM" = "$CURRENT_ALGORITHM" ]; then
              BASELINE_ARG="baseline_dir/arcade_analysis_baseline.json"
            else
              BASELINE_NOTE="Improvement tracking is temporarily unavailable because the stored baseline uses '$BASELINE_ALGORITHM' while the current primary analysis uses '$CURRENT_ALGORITHM'. After the next successful push to ${BASELINE_BRANCH}, the baseline will be refreshed and PR improvement deltas will resume."
            fi
          else
            BASELINE_NOTE="Improvement tracking is unavailable because no baseline artifact was found yet. After the next successful push to ${BASELINE_BRANCH}, PR improvement deltas will appear."
          fi
          arcade-compare-baseline \
            arcade_analysis_results.json \
            $BASELINE_ARG \
            --output pr_comment.md \
            --output-html arcade_analysis_comparison.html \
            --baseline-note "$BASELINE_NOTE" \
            --run-url "$RUN_URL"

      - name: Upload analysis artifacts
        if: env.UPLOAD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ANALYSIS_ARTIFACT_NAME }}
          path: |
            arcade_analysis_report.html
            arcade_analysis_results.json
            arcade_analysis_comparison.html
            pr_comment.md
            arcade_analysis_acdc.html
            arcade_analysis_acdc.json
            arcade_analysis_wca.html
            arcade_analysis_wca.json
          retention-days: ${{ env.ANALYSIS_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Store baseline artifact
        if: env.STORE_BASELINE_ON_PUSH == 'true' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH)
        run: cp arcade_analysis_results.json arcade_analysis_baseline.json

      - name: Upload baseline artifact
        if: env.STORE_BASELINE_ON_PUSH == 'true' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BASELINE_ARTIFACT_NAME }}
          path: arcade_analysis_baseline.json
          retention-days: ${{ env.BASELINE_RETENTION_DAYS }}

      - name: Post or update PR comment
        if: env.POST_PR_COMMENT == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- arcade-agent-analysis -->';
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const body = `${marker}\n${commentBody}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.data.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Skip PR comment on forked PRs
        if: env.POST_PR_COMMENT == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Skipping PR comment because forked pull_request workflows do not receive write access to PR comments."
