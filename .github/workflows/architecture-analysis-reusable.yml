name: Architecture Analysis Reusable

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for analysis.
        required: false
        type: string
        default: "3.12"
      arcade-agent-version:
        description: Released arcade-agent package version to install, or "source" to install the checked-out repository (self-dogfooding).
        required: false
        type: string
        default: "0.1.1"
      install-extras:
        description: Extras string appended to the arcade-agent package install.
        required: false
        type: string
        default: "[languages]"
      source-path:
        description: Path to project root for analysis.
        required: false
        type: string
        default: "."
      language:
        description: Optional language override (java, python, typescript, c, go, kotlin, rust).
        required: false
        type: string
        default: ""
      repo-name:
        description: Optional repository name override for reports.
        required: false
        type: string
        default: ""
      primary-algorithm:
        description: Primary architecture recovery algorithm.
        required: false
        type: string
        default: "pkg"
      filter-non-architectural-helpers:
        description: Apply arcade-agent self-dogfooding helper filters. Leave false for generic repositories.
        required: false
        type: boolean
        default: false
      run-secondary-analyses:
        description: Whether to run ACDC and exploratory WCA analyses.
        required: false
        type: boolean
        default: true
      wca-num-clusters:
        description: Cluster count for exploratory WCA run.
        required: false
        type: number
        default: 4
      upload-artifacts:
        description: Upload HTML/JSON artifacts.
        required: false
        type: boolean
        default: true
      analysis-artifact-name:
        description: Artifact name for analysis outputs.
        required: false
        type: string
        default: "arcade-agent-self-analysis"
      analysis-artifact-retention-days:
        description: Retention days for analysis artifact.
        required: false
        type: number
        default: 30
      baseline-workflow-id:
        description: Optional workflow filename or ID used to search successful baseline runs. Blank searches all workflow runs on the baseline branch.
        required: false
        type: string
        default: ""
      baseline-branch:
        description: Branch used for baseline artifacts. Defaults to the repository default branch.
        required: false
        type: string
        default: ""
      baseline-artifact-name:
        description: Artifact name storing baseline JSON.
        required: false
        type: string
        default: "arcade-agent-baseline"
      baseline-retention-days:
        description: Retention days for baseline artifact.
        required: false
        type: number
        default: 90
      store-baseline-on-push:
        description: Store baseline artifact on baseline branch pushes.
        required: false
        type: boolean
        default: true
      post-pr-comment:
        description: Post or update PR comment with analysis summary.
        required: false
        type: boolean
        default: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      BASELINE_BRANCH: ${{ inputs.baseline-branch || github.event.repository.default_branch }}
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target-repo
          fetch-depth: 1

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install arcade-agent
        env:
          ARCADE_AGENT_VERSION: ${{ inputs.arcade-agent-version }}
          INSTALL_EXTRAS: ${{ inputs.install-extras }}
        run: |
          python -m pip install --upgrade pip
          if [ "${ARCADE_AGENT_VERSION}" = "source" ]; then
            # Self-dogfooding: install the checked-out repo so analysis runs the
            # code under review, not a released package that necessarily lags it.
            python -m pip install "./target-repo${INSTALL_EXTRAS}"
          elif [ "${ARCADE_AGENT_VERSION}" = "latest" ]; then
            python -m pip install "arcade-agent${INSTALL_EXTRAS}"
          else
            python -m pip install "arcade-agent${INSTALL_EXTRAS}==${ARCADE_AGENT_VERSION}"
          fi

      - name: Run primary self-analysis
        env:
          SOURCE_PATH: ${{ inputs.source-path }}
          LANGUAGE: ${{ inputs.language }}
          REPO_NAME: ${{ inputs.repo-name }}
          PRIMARY_ALGORITHM: ${{ inputs.primary-algorithm }}
          FILTER_NON_ARCHITECTURAL_HELPERS: ${{ inputs.filter-non-architectural-helpers }}
        run: |
          ARGS=(--source "target-repo/${SOURCE_PATH}")
          if [ -n "${LANGUAGE}" ]; then
            ARGS+=(--language "${LANGUAGE}")
          fi
          if [ -n "${REPO_NAME}" ]; then
            ARGS+=(--repo-name "${REPO_NAME}")
          fi
          if [ "${FILTER_NON_ARCHITECTURAL_HELPERS}" = "true" ]; then
            ARGS+=(--filter-non-architectural-helpers)
          fi
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm "${PRIMARY_ALGORITHM}" \
            --output-json arcade_analysis_results.json \
            --output-html arcade_analysis_report.html

      - name: Run secondary architecture analyses
        if: inputs.run-secondary-analyses
        env:
          SOURCE_PATH: ${{ inputs.source-path }}
          LANGUAGE: ${{ inputs.language }}
          REPO_NAME: ${{ inputs.repo-name }}
          WCA_NUM_CLUSTERS: ${{ inputs.wca-num-clusters }}
          FILTER_NON_ARCHITECTURAL_HELPERS: ${{ inputs.filter-non-architectural-helpers }}
        run: |
          ARGS=(--source "target-repo/${SOURCE_PATH}")
          if [ -n "${LANGUAGE}" ]; then
            ARGS+=(--language "${LANGUAGE}")
          fi
          if [ -n "${REPO_NAME}" ]; then
            ARGS+=(--repo-name "${REPO_NAME}")
          fi
          if [ "${FILTER_NON_ARCHITECTURAL_HELPERS}" = "true" ]; then
            ARGS+=(--filter-non-architectural-helpers)
          fi
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm acdc \
            --output-json arcade_analysis_acdc.json \
            --output-html arcade_analysis_acdc.html
          arcade-self-analysis \
            "${ARGS[@]}" \
            --algorithm wca \
            --num-clusters "${WCA_NUM_CLUSTERS}" \
            --output-json arcade_analysis_wca.json \
            --output-html arcade_analysis_wca.html

      - name: Display primary analysis results
        run: arcade-log-analysis-summary arcade_analysis_results.json

      - name: Display secondary analysis results
        if: inputs.run-secondary-analyses
        run: |
          echo "== ACDC =="
          arcade-log-analysis-summary arcade_analysis_acdc.json
          echo "== WCA (exploratory) =="
          arcade-log-analysis-summary arcade_analysis_wca.json

      - name: Download baseline (if available)
        id: download_baseline
        uses: actions/github-script@v7
        env:
          BASELINE_ARTIFACT_NAME: ${{ inputs.baseline-artifact-name }}
          BASELINE_BRANCH: ${{ env.BASELINE_BRANCH }}
          BASELINE_WORKFLOW_ID: ${{ inputs.baseline-workflow-id }}
        with:
          script: |
            const fs = require('fs');
            const baselineArtifactName = process.env.BASELINE_ARTIFACT_NAME;
            const baselineBranch = process.env.BASELINE_BRANCH;
            const baselineWorkflowId = process.env.BASELINE_WORKFLOW_ID;

            const runQuery = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: baselineBranch,
              status: 'success',
              per_page: 10,
            };
            const runs = baselineWorkflowId
              ? await github.rest.actions.listWorkflowRuns({
                  ...runQuery,
                  workflow_id: baselineWorkflowId,
                })
              : await github.rest.actions.listWorkflowRunsForRepo(runQuery);

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });

              const baseline = artifacts.data.artifacts.find(
                a => a.name === baselineArtifactName
              );
              if (!baseline) continue;

              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: baseline.id,
                archive_format: 'zip',
              });

              fs.writeFileSync('baseline.zip', Buffer.from(download.data));
              core.setOutput('found', 'true');
              console.log(`Downloaded baseline from run ${run.id} (${run.created_at})`);
              return;
            }

            core.setOutput('found', 'false');
            console.log('No baseline artifact found - first run or baseline expired.');

      - name: Unpack baseline
        if: steps.download_baseline.outputs.found == 'true'
        run: |
          mkdir -p baseline_dir
          unzip -q baseline.zip -d baseline_dir
          echo "Baseline contents:"
          ls baseline_dir/

      - name: Compare with baseline and generate comment
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BASELINE_ARG=""
          BASELINE_NOTE=""
          CURRENT_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('arcade_analysis_results.json').read_text()).get('algorithm', ''))")
          if [ -f baseline_dir/arcade_analysis_baseline.json ]; then
            BASELINE_ALGORITHM=$(python -c "import json; from pathlib import Path; print(json.loads(Path('baseline_dir/arcade_analysis_baseline.json').read_text()).get('algorithm', ''))")
            if [ "$BASELINE_ALGORITHM" = "$CURRENT_ALGORITHM" ]; then
              BASELINE_ARG="baseline_dir/arcade_analysis_baseline.json"
            else
              BASELINE_NOTE="Improvement tracking is temporarily unavailable because the stored baseline uses '$BASELINE_ALGORITHM' while the current primary analysis uses '$CURRENT_ALGORITHM'. After the next successful push to ${BASELINE_BRANCH}, the baseline will be refreshed and PR improvement deltas will resume."
              echo "$BASELINE_NOTE"
            fi
          else
            BASELINE_NOTE="Improvement tracking is unavailable because no baseline artifact was found yet. After the next successful push to ${BASELINE_BRANCH}, PR improvement deltas will appear."
          fi
          arcade-compare-baseline \
            arcade_analysis_results.json \
            $BASELINE_ARG \
            --output pr_comment.md \
            --output-html arcade_analysis_comparison.html \
            --baseline-note "$BASELINE_NOTE" \
            --run-url "$RUN_URL"

      - name: Upload analysis artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.analysis-artifact-name }}
          path: |
            arcade_analysis_report.html
            arcade_analysis_results.json
            arcade_analysis_comparison.html
            pr_comment.md
            arcade_analysis_acdc.html
            arcade_analysis_acdc.json
            arcade_analysis_wca.html
            arcade_analysis_wca.json
          retention-days: ${{ inputs.analysis-artifact-retention-days }}
          if-no-files-found: warn

      - name: Store baseline artifact
        if: inputs.store-baseline-on-push && github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH) && github.event_name == 'push'
        run: cp arcade_analysis_results.json arcade_analysis_baseline.json

      - name: Upload baseline artifact
        if: inputs.store-baseline-on-push && github.ref == format('refs/heads/{0}', env.BASELINE_BRANCH) && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.baseline-artifact-name }}
          path: arcade_analysis_baseline.json
          retention-days: ${{ inputs.baseline-retention-days }}

      - name: Post analysis comment to PR
        if: inputs.post-pr-comment && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            const marker = '<!-- arcade-agent-analysis -->';
            const body = `${marker}\n${commentBody}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing analysis comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new analysis comment.');
            }

      - name: Skip PR comment on forked PRs
        if: inputs.post-pr-comment && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Skipping PR comment because pull_request workflows from forks do not receive a token with write access to PR comments."
