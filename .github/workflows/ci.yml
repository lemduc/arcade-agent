name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev,languages,mcp]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest --tb=short

  # ── Self-dogfooding: arcade-agent analyses its own codebase ────────────────
  analysis:
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/architecture-analysis-reusable.yml
    with:
      python-version: "3.12"
      source-path: .
      primary-algorithm: pkg
      baseline-workflow-id: ci.yml
      arcade-agent-version: "0.1.1"
      filter-non-architectural-helpers: true
    secrets: inherit
