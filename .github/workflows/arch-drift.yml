name: Architecture Drift Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to parse (blank for auto-detect)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ARCADE_AGENT_VERSION: "0.1.1"

jobs:
  # On PR: analyze architecture and post comment
  analyze:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install arcade-agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install "arcade-agent[languages]==${ARCADE_AGENT_VERSION}"

      - name: Run architecture drift detection
        id: drift
        run: |
          LANG_ARG=""
          if [ -n "${{ github.event.inputs.language }}" ]; then
            LANG_ARG="--language ${{ github.event.inputs.language }}"
          fi
          arcade-arch-diff --source . $LANG_ARG > drift-report.md 2>&1 || true
          echo "report<<ARCADE_EOF" >> "$GITHUB_OUTPUT"
          cat drift-report.md >> "$GITHUB_OUTPUT"
          echo "ARCADE_EOF" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- arcade-agent-drift-report -->';
            const report = fs.readFileSync('drift-report.md', 'utf8');
            const body = report.includes(marker) ? report : `${report}\n${marker}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const matches = comments
              .filter(comment => comment.body && comment.body.includes(marker))
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            if (matches.length) {
              const [target, ...duplicates] = matches;
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: target.id,
                body,
              });
              for (const duplicate of duplicates) {
                try {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: duplicate.id,
                  });
                } catch (error) {
                  core.warning(`Could not delete duplicate drift comment ${duplicate.id}: ${error.message}`);
                }
              }
              console.log('Updated existing architecture drift comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created architecture drift comment.');
            }

  # On push to default branch: update baseline
  update-baseline:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install arcade-agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install "arcade-agent[languages]==${ARCADE_AGENT_VERSION}"

      - name: Update baseline
        run: |
          LANG_ARG=""
          if [ -n "${{ github.event.inputs.language }}" ]; then
            LANG_ARG="--language ${{ github.event.inputs.language }}"
          fi
          arcade-arch-diff --source . $LANG_ARG --update-baseline > /dev/null

      - name: Commit baseline if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update architecture baseline"
          file_pattern: ".arcade/baseline.json"
